name: Il mio Agente IA per la Tesi

on: [push] # Si attiva automaticamente ad ogni push

jobs:
  avvia-analisi:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Scarica il codice appena pushato sulla macchina virtuale
      - name: Scarica il repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Importante per permettere a git diff-tree di funzionare

      # 2. Prepara l'ambiente Python (usiamo una versione stabile)
      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      # 3. Installa l'SDK ufficiale di Gemini
      - name: Installa librerie
        run: pip install google-genai

      # 4. Lancia lo script Python passandogli la chiave API in modo sicuro
      - name: Esegui l'Agente IA
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        # ASSICURATI CHE IL NOME DEL FILE QUI SOTTO CORRISPONDA AL TUO FILE PYTHON
        run: python agente_ia.py 
      
      # 5. (NUOVO) Salva il report generato come artefatto scaricabile
      - name: Salva il Report Analisi
        uses: actions/upload-artifact@v4
        with:
          name: report-revisione-ia
          path: REPORT_AGENTE_IA.md